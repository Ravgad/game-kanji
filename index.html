<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Kanji Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
    <div id="screen-home" class="screen">
        <h1>⛩️ Kanji Quest</h1>
        <p class="subtitle">Belajar Kanji JLPT dengan menyenangkan</p>

        <div class="section-title">PILIH LEVEL:</div>
        <div class="level-grid">
            <button class="btn-choice btn-level selected" onclick="selectLevel('N5', this)">N5</button>
            <button class="btn-choice btn-level" onclick="selectLevel('N4', this)">N4</button>
            <button class="btn-choice btn-level" onclick="selectLevel('N3', this)">N3</button>
            <button class="btn-choice btn-level" onclick="selectLevel('N2', this)">N2</button>
            <button class="btn-choice btn-level" onclick="selectLevel('N1', this)">N1</button>
        </div>

        <div class="section-title">JUMLAH SOAL:</div>
        <div class="choice-grid">
            <button class="btn-choice btn-qty selected" onclick="selectQty(5, this)">5</button>
            <button class="btn-choice btn-qty" onclick="selectQty(10, this)">10</button>
            <button class="btn-choice btn-qty" onclick="selectQty(15, this)">15</button>
        </div>

        <div class="setting-item">
            <span>Tampilkan Arti Kanji</span>
            <label class="switch">
                <input type="checkbox" id="toggle-meaning" checked>
                <span class="slider round"></span>
            </label>
        </div>

        <button class="btn-start" onclick="startQuiz()">MULAI BELAJAR ▶</button>
    </div>

    <div id="screen-quiz" class="screen hidden">
        <div class="header">
            <button class="btn-quit" onclick="quitQuiz()">✕</button>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <span id="q-count">0/0</span>
        </div>

        <div class="kanji-display" id="current-kanji"></div>
        <p id="kanji-meaning"></p>
        
        <div class="answer-box" id="user-answer"></div>

        <div class="keyboard">
            <div class="kb-tabs">
                <button class="tab-btn active" id="btn-hira" onclick="switchKb('hira')">あ Hira</button>
                <button class="tab-btn" id="btn-kata" onclick="switchKb('kata')">が Hira</button>
            </div>
            <div class="keys-grid" id="keys-container"></div>
            <div class="kb-controls">
                <button class="btn-delete" onclick="deleteChar()">⌫</button>
                <button class="btn-submit" onclick="submitAnswer()">Kirim ✓</button>
            </div>
        </div>
    </div>

    <div id="screen-result" class="screen hidden">
        <h2>Hasil Belajar</h2>
        <div class="score-card">
            <div id="final-score" class="score-value">0</div>
            <div class="label">Total Poin</div>
        </div>
        <div id="review-list" class="review-scroll"></div>
        <button class="btn-home" onclick="location.reload()">KEMBALI KE HOME</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
